<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Private Dashboard</title>
    
    <link rel="stylesheet" href="index_files/css3menu1/style.css" type="text/css" />

    <style>
        @import url(//fonts.googleapis.com/css?family=Lato:300:400);

        body { margin: 0; font-family: 'Lato', sans-serif; background-color: #EBEBEB; }
        h1 { font-weight: 300; letter-spacing: 2px; font-size: 48px; margin: 0; }
        
        .header {
            position: relative;
            text-align: center;
            background: linear-gradient(60deg, rgba(84,58,183,1) 0%, rgba(0,172,193,1) 100%);
            color: white;
            z-index: 1000;
        }
        .inner-header { height: 60vh; width: 100%; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .waves { position: relative; width: 100%; height: 15vh; margin-bottom: -7px; min-height: 100px; max-height: 150px; }

        .login-container { margin-top: 20px; }
        input[type="password"] {
            padding: 12px; border-radius: 25px; border: none; width: 220px;
            outline: none; text-align: center; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button {
            padding: 10px 30px; margin-top: 15px; border-radius: 25px; border: 2px solid white;
            background: transparent; color: white; cursor: pointer; transition: 0.3s; font-size: 14px; font-weight: bold;
        }
        button:hover { background: white; color: rgba(0,172,193,1); }

        /* 書籤注入區 */
        #content-area { display: none; }

        /* 解鎖後背景 */
        .unlocked-bg {
            background: #EBEBEB url(background/wallpaper2you_345056.jpg) center center fixed no-repeat !important;
            background-size: cover !important;
            min-height: 100vh;
        }

        .parallax > use { animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }
        @keyframes move-forever { 0% { transform: translate3d(-90px,0,0); } 100% { transform: translate3d(85px,0,0); } }

        @media (max-width: 768px) { h1 { font-size: 24px; } .inner-header { height: 50vh; } }
    </style>
</head>
<body id="main-body">

<div id="login-screen" class="header">
    <div class="inner-header">
        <h1>Private Bookmark</h1>
        <div class="login-container">
            <input type="password" id="password" placeholder="正在連結雲端驗證..." disabled>
            <br>
            <button id="unlock-btn" onclick="checkPassword()" disabled>CONNECTING</button>
            <p id="msg" style="color: #ffcfcf; font-size: 13px; margin-top: 10px;"></p>
        </div>
    </div>
    <svg class="waves" viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs><path id="gw" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" /></defs>
        <g class="parallax">
            <use xlink:href="#gw" x="48" y="0" fill="rgba(255,255,255,0.7" /><use xlink:href="#gw" x="48" y="3" fill="rgba(255,255,255,0.5)" /><use xlink:href="#gw" x="48" y="5" fill="rgba(255,255,255,0.3)" /><use xlink:href="#gw" x="48" y="7" fill="#fff" />
        </g>
    </svg>
</div>

<div id="content-area"></div>

<script>
    // 已經為您填入正確的雲端 ID
    const PASS_FILE_ID = "1shqN8CQi70GII2u4oU5iq95M4_CJ-Nug"; 
    const SOURCE_FILE_ID = "1h7_cIUTmWkyYvduiAgs59zEkiQMBB71w"; 

    let remotePassword = "";

    // 初始化：抓取密碼檔
    fetch(`https://docs.google.com/uc?export=download&id=${PASS_FILE_ID}`)
        .then(res => res.text())
        .then(data => {
            remotePassword = data.trim();
            document.getElementById('password').disabled = false;
            document.getElementById('password').placeholder = "輸入解鎖密碼";
            document.getElementById('unlock-btn').innerText = "UNLOCK";
            document.getElementById('unlock-btn').disabled = false;
        })
        .catch(err => { 
            document.getElementById('msg').innerText = "雲端連線異常，請檢查權限。"; 
        });

    function checkPassword() {
        const pw = document.getElementById('password').value;
        if(pw === remotePassword && remotePassword !== "") {
            document.getElementById('msg').innerText = "驗證成功，正在讀取書籤...";
            
            // 抓取 560 行書籤 source.txt
            fetch(`https://docs.google.com/uc?export=download&id=${SOURCE_FILE_ID}`)
                .then(res => res.text())
                .then(html => {
                    // 1. 移除登入蓋板
                    document.getElementById('login-screen').style.display = "none";
                    // 2. 切換背景樣式
                    document.getElementById('main-body').classList.add('unlocked-bg');
                    // 3. 注入書籤內容
                    const content = document.getElementById('content-area');
                    content.innerHTML = html;
                    content.style.display = "block";
                    window.scrollTo(0,0);
                })
                .catch(err => {
                    document.getElementById('msg').innerText = "書籤內容抓取失敗。";
                });
        } else {
            document.getElementById('msg').innerText = "密碼錯誤，拒絕存取。";
        }
    }

    // 支援 Enter 鍵
    document.getElementById('password').onkeydown = e => { if(e.keyCode == 13) checkPassword(); };
</script>
</body>
</html>
