<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>PiPi's Bookmark</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        /* 全域與背景 */
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: system-ui, -apple-system; }
        #login-ui {
            height: 100vh; background: linear-gradient(135deg, #543ab7 0%, #00acc1 100%);
            display: flex; flex-direction: column; position: relative;
        }
        .center { flex: 1; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .login-box { width: 300px; text-align: center; color: white; margin-bottom: 150px; }
        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; font-size: 32px; }
        input {
            width: 100%; padding: 12px; border: none; border-radius: 30px; text-align: center;
            outline: none; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; background: rgba(255, 255, 255, 0.9);
        }
        button {
            width: 100%; padding: 11px; border-radius: 30px; border: 2px solid white;
            background: transparent; color: white; font-weight: bold; cursor: pointer; transition: 0.25s;
        }
        button:hover { background: white; color: #00acc1; }
        #msg { margin-top: 15px; font-size: 13px; color: #ffecec; min-height: 1.2em; }
        /* 大波浪 */
        .waves { width: 100%; height: 200px; position: absolute; bottom: 0; }
        .parallax > use { animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }
        @keyframes move-forever { 0% { transform: translate3d(-90px,0,0); } 100% { transform: translate3d(85px,0,0); } }
        @media (max-width: 600px) { .login-box { width: 85%; } .waves { height: 100px; } }
        /* 🚀 新增：轉場遮罩層（紫陽花背景） */
        #loading-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        /* 這裡路徑請確保與你的 Repo 結構一致 */
        background: #000 url('background/wallpaper2you_345056.jpg') no-repeat center center;
        background-size: cover;
        z-index: 9999; /* 確保在最上層 */
        display: none; /* 預設隱藏 */
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 24px;
        letter-spacing: 5px;
        text-shadow: 0 0 15px rgba(0,0,0,0.8);
        opacity: 0;
        transition: opacity 0.4s ease;}        
    </style>
</head>
<body>
<div id="loading-overlay">LOADING...</div>
<div id="login-ui">
    <div class="center">
<div class="login-box">
    <h1>PiPi's Bookmark</h1>
    <form id="login-form" onsubmit="event.preventDefault(); unlock();">
        <input type="text" name="username" value="pipi" style="display:none;" autocomplete="username">        
        <input type="password" id="password" name="password" 
               placeholder="ENTER PASSWORD" 
               autocomplete="current-password" 
               autofocus>
               
        <button type="submit">UNLOCK</button>
    </form>
    <div id="msg"></div>
</div>
    </div>
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none">
        <defs><path id="wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" /></defs>
        <g class="parallax">
            <use href="#wave" x="48" y="0" fill="rgba(255,255,255,0.7)" /><use href="#wave" x="48" y="3" fill="rgba(255,255,255,0.5)" />
            <use href="#wave" x="48" y="5" fill="rgba(255,255,255,0.3)" /><use href="#wave" x="48" y="7" fill="#ffffff" />
        </g>
    </svg>
</div>

<script>
    const k_p1 = "Z2hwX0U0UjZHVTNmaz", k_p2 = "Fid3hVNnN6N0h2TFJiQm", k_p3 = "VEdDhVQjJCQnd2TA==";
    const CFG = { user: "pipi-family", repo: "my-private-data", _k: k_p1 + k_p2 + k_p3 };

    function decodeBase64UTF8(str) {
        const binStr = atob(str), bytes = new Uint8Array(binStr.length);
        for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
        return new TextDecoder("utf-8").decode(bytes);
    }

    // 🚀 核心優化：徹底移除 index 痕跡
    function renderSource(html) {
        document.open();
        document.write(html);
        document.close();
    }

    window.onload = () => {
        const saved = sessionStorage.getItem("vault");
        if (saved) renderSource(saved);
    };

    async function fetchVault(file) {
        const url = `https://api.github.com/repos/${CFG.user}/${CFG.repo}/contents/${file}`;
        const res = await fetch(url, { headers: { Authorization: `token ${atob(CFG._k)}` } });
        if (!res.ok) throw "api";
        const data = await res.json();
        return decodeBase64UTF8(data.content.replace(/\s/g, ""));
    }

    async function unlock() {
    const msg = document.getElementById("msg");
    const pwd = document.getElementById("password").value;
    const overlay = document.getElementById("loading-overlay"); // 🚀 取得遮罩
    const hash = CryptoJS.SHA256(pwd).toString();
    
    msg.innerText = "Connecting...";
    try {
        const passJson = await fetchVault("pass.json");
        if (hash === JSON.parse(passJson).hash) {
            
            // 🚀 關鍵動作：驗證成功後立刻顯示遮罩，蓋住接下來的 FOUC
            overlay.style.display = "flex";
            setTimeout(() => overlay.style.opacity = "1", 10); 

            const html = await fetchVault("source.html");
            sessionStorage.setItem("vault", html);
            renderSource(html);
        } else { 
            msg.innerText = "Access Denied"; 
        }
    } catch (e) { 
        msg.innerText = "Connection Error"; 
    }
}

    document.getElementById("password").addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });
</script>
</body>
</html>
