<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Private Bookmark</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>

@import url(//fonts.googleapis.com/css?family=Lato:300:400);

body{
margin:0;
font-family:'Lato',sans-serif;
background:#EBEBEB;
}

.header{
position:relative;
text-align:center;
background:linear-gradient(60deg,#543ab7 0%,#00acc1 100%);
color:white;
}

.inner-header{
height:60vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.login-container{
margin-top:20px;
}

input[type=password]{
padding:12px;
border-radius:25px;
border:none;
width:220px;
text-align:center;
font-size:16px;
outline:none;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

button{
padding:10px 30px;
margin-top:15px;
border-radius:25px;
border:2px solid white;
background:transparent;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:white;
color:#00acc1;
}

#content-area{
display:none;
}

.unlocked-bg{
background:#EBEBEB url(background/wallpaper2you_345056.jpg) center center fixed no-repeat!important;
background-size:cover!important;
min-height:100vh;
}

.waves{
position:relative;
width:100%;
height:15vh;
margin-bottom:-7px;
}

.parallax>use{
animation:move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
}

@keyframes move-forever{
0%{transform:translate3d(-90px,0,0);}
100%{transform:translate3d(85px,0,0);}
}

</style>
</head>

<body id="main-body">

<div id="login-screen" class="header">

<div class="inner-header">

<h1>Private Bookmark</h1>

<div class="login-container">

<input type="password" id="password" placeholder="正在連結雲端..." disabled>

<br>

<button id="unlock-btn" disabled>CONNECTING</button>

<p id="msg" style="color:#ffcfcf;font-size:13px;margin-top:10px;"></p>

</div>

</div>

<svg class="waves" viewBox="0 24 150 28" preserveAspectRatio="none">
<defs>
<path id="gw" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z"/>
</defs>

<g class="parallax">

<use xlink:href="#gw" x="48" y="0" fill="rgba(255,255,255,0.7)"/>
<use xlink:href="#gw" x="48" y="3" fill="rgba(255,255,255,0.5)"/>
<use xlink:href="#gw" x="48" y="5" fill="rgba(255,255,255,0.3)"/>
<use xlink:href="#gw" x="48" y="7" fill="#fff"/>

</g>
</svg>

</div>

<div id="content-area"></div>

<script>

/* Google Drive File ID */

const PASS_URL =
"https://drive.google.com/uc?id=1KrW-Vh2i6YmaT2Uo1_4JiG-3OzXR0Owe&export=download";

const SOURCE_URL =
"https://drive.google.com/uc?id=1G1p60Ha8Zh5_0wz-aqPUBorIKf3WqnoG&export=download";

let hashedKey="";

/* 初始化 */

async function init(){

try{

const res=await fetch(PASS_URL);

const text=await res.text();

console.log("PASS RAW:",text);

const data=JSON.parse(text);

hashedKey=data.hash;

document.getElementById("password").disabled=false;
document.getElementById("password").placeholder="輸入解鎖密碼";

const btn=document.getElementById("unlock-btn");
btn.disabled=false;
btn.innerText="UNLOCK";

btn.onclick=checkPassword;

}catch(err){

console.error(err);

document.getElementById("msg").innerText=
"pass.json 讀取失敗 (Drive權限或CORS)";

}

}

/* 密碼驗證 */

async function checkPassword(){

const input=document.getElementById("password").value;

const inputHash=CryptoJS.SHA256(input).toString();

if(inputHash===hashedKey){

document.getElementById("msg").innerText="驗證成功，載入書籤...";

try{

const res=await fetch(SOURCE_URL);

const html=await res.text();

document.getElementById("login-screen").style.display="none";

document.getElementById("main-body").classList.add("unlocked-bg");

const content=document.getElementById("content-area");

content.innerHTML=html;

content.style.display="block";

window.scrollTo(0,0);

}catch(err){

document.getElementById("msg").innerText="書籤載入失敗";

}

}else{

document.getElementById("msg").innerText="密碼錯誤";

}

}

/* Enter鍵 */

document.addEventListener("keydown",function(e){

if(e.key==="Enter") checkPassword();

});

init();

</script>

</body>
</html>
