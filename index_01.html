<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Private Bookmark</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
/* 1. 直接定義密碼的雜湊值 (這是 ^.^_@_0505 的加密碼) */
const CORRECT_HASH = "b6a06657871e9565507981882f09405f6e864819d9b04f76239f60f699049449";

/* 2. 內容檔案的 ID */
const SOURCE_ID = "1G1p60Ha8Zh5_0wz-aqPUBorIKf3WqnoG";

let attempts = 0;

/* 3. 簡化後的初始化 (不再需要 fetch pass.json) */
function init() {
    // 網頁一打開就解鎖輸入框
    password.disabled = false;
    password.placeholder = "輸入解鎖密碼";
    unlockBtn.disabled = false;
    unlockBtn.innerText = "UNLOCK";
    console.log("System Ready: Local Hash Verification Enabled");
}

/* 4. 解鎖功能 */
function unlock() {
    if (attempts >= 5) {
        msg.innerText = "嘗試次數過多，請稍後再試";
        return;
    }

    const input = password.value;
    const inputHash = CryptoJS.SHA256(input).toString();

    if (inputHash !== CORRECT_HASH) {
        attempts++;
        msg.innerText = `密碼錯誤 (剩餘 ${5 - attempts} 次嘗試)`;
        password.value = "";
        return;
    }

    /* 驗證成功：加載內容 */
    login.style.display = "none";
    document.body.style.background = "#EBEBEB"; // 切換背景色
    content.style.display = "block";
    
    // 使用 iframe 嵌入，這不受 CORS 限制
    content.innerHTML = `<iframe src="https://drive.google.com/file/d/${SOURCE_ID}/preview"></iframe>`;
}

/* 監聽 Enter 鍵 */
password.addEventListener("keydown", e => {
    if (e.key === "Enter") unlock();
});

unlockBtn.onclick = unlock;

init();
    </style>
</head>

<body>

<div id="login" class="header">
    <div class="inner-header">
        <h1>Private Bookmark</h1>
        <div style="margin-top: 20px;">
            <input type="password" id="password" placeholder="Syncing cloud..." disabled>
            <br>
            <button id="unlockBtn" disabled>CONNECTING</button>
            <p id="msg"></p>
        </div>
    </div>

    <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none">
        <defs><path id="wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z"/></defs>
        <g class="parallax">
            <use href="#wave" x="48" y="0" fill="rgba(255,255,255,0.7)"/>
            <use href="#wave" x="48" y="3" fill="rgba(255,255,255,0.5)"/>
            <use href="#wave" x="48" y="5" fill="rgba(255,255,255,0.3)"/>
            <use href="#wave" x="48" y="7" fill="#fff"/>
        </g>
    </svg>
</div>

<div id="content"></div>

<script>
    /* Google Drive IDs */
    const PASS_JSON_ID = "1KrW-Vh2i6YmaT2Uo1_4JiG-3OzXR0Owe";
    const SOURCE_ID = "1G1p60Ha8Zh5_0wz-aqPUBorIKf3WqnoG";

    let CORRECT_HASH = "";
    let attempts = 0;

    /* 初始化：取得密碼雜湊值 */
    async function init() {
        const url = `https://docs.google.com/uc?export=download&id=${PASS_JSON_ID}`;
        try {
            const r = await fetch(url);
            const data = await r.json();
            // 支援您 pass.json 裡的 "hash" 欄位
            CORRECT_HASH = data.hash || data.key; 

            password.disabled = false;
            password.placeholder = "輸入解鎖密碼";
            unlockBtn.disabled = false;
            unlockBtn.innerText = "UNLOCK";
        } catch (e) {
            msg.innerText = "雲端同步失敗，請檢查 pass.json 權限";
        }
    }

    /* 解鎖功能 */
    function unlock() {
        if (attempts >= 5) {
            msg.innerText = "嘗試次數過多，請稍後再試";
            return;
        }

        const input = password.value;
        const inputHash = CryptoJS.SHA256(input).toString();

        if (inputHash !== CORRECT_HASH) {
            attempts++;
            msg.innerText = `密碼錯誤 (剩餘 ${5 - attempts} 次嘗試)`;
            password.value = "";
            return;
        }

        /* 驗證成功：加載內容 */
        login.style.display = "none";
        content.style.display = "block";
        
        // 渲染嵌入式 Google Drive 頁面
        content.innerHTML = `<iframe src="https://drive.google.com/file/d/${SOURCE_ID}/preview"></iframe>`;
    }

    /* 事件監聽 */
    password.addEventListener("keydown", e => {
        if (e.key === "Enter") unlock();
    });

    unlockBtn.onclick = unlock;

    init();
</script>

</body>
</html>
