<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/gif" href="/favicon/animated_favicon1.gif">
    <link rel="shortcut icon" href="/favicon/favicon.ico" type="image/x-icon" />
    <link rel="icon" href="/favicon/favicon.ico" type="image/x-icon" />
<title>Private Bookmark</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>

@import url(//fonts.googleapis.com/css?family=Lato:300:400);

body{
margin:0;
font-family:'Lato',sans-serif;
}

.header{
position:relative;
text-align:center;
background:linear-gradient(60deg,#543ab7,#00acc1);
color:white;
}

.inner-header{
height:60vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

input{
padding:12px;
border-radius:25px;
border:none;
width:220px;
text-align:center;
font-size:16px;
}

button{
padding:10px 30px;
margin-top:15px;
border-radius:25px;
border:2px solid white;
background:transparent;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:white;
color:#00acc1;
}

#msg{
font-size:13px;
margin-top:10px;
color:#ffdede;
}

/* wave */

.waves{
position:relative;
width:100%;
height:15vh;
margin-bottom:-7px;
}

.parallax>use{
animation:move 25s infinite;
}

@keyframes move{
0%{transform:translateX(-90px)}
100%{transform:translateX(85px)}
}

#content{
display:none;
background:#EBEBEB;
min-height:100vh;
}

</style>

</head>

<body>

<div id="login" class="header">

<div class="inner-header">

<h1>Private Bookmark</h1>

<input
type="password"
id="password"
placeholder="Connecting..."
disabled>

<br>

<button id="unlockBtn" disabled>CONNECTING</button>

<p id="msg"></p>

</div>

<svg class="waves" viewBox="0 24 150 28">

<defs>
<path id="wave"
d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z"/>
</defs>

<g class="parallax">
<use href="#wave" x="48" y="0" fill="rgba(255,255,255,0.7)"/>
<use href="#wave" x="48" y="3" fill="rgba(255,255,255,0.5)"/>
<use href="#wave" x="48" y="5" fill="rgba(255,255,255,0.3)"/>
<use href="#wave" x="48" y="7" fill="#fff"/>
</g>

</svg>

</div>

<div id="content"></div>

<script>

/* files */

const PASS_URL="pass.json"

const SOURCE_URL=
"https://drive.google.com/uc?export=download&id=1G1p60Ha8Zh5_0wz-aqPUBorIKf3WqnoG"

/* vars */

let HASH=""
let attempt=0

/* init */

async function init(){

try{

let r=await fetch(PASS_URL)
let data=await r.json()

HASH=data.hash

password.disabled=false
password.placeholder="輸入解鎖密碼"

unlockBtn.disabled=false
unlockBtn.innerText="UNLOCK"

}catch(e){

msg.innerText="pass.json 讀取失敗"

}

}

/* unlock */

async function unlock(){

if(attempt>5){

msg.innerText="Too many attempts"
return

}

let input=password.value

let hash=CryptoJS.SHA256(input).toString()

if(hash!==HASH){

attempt++
msg.innerText="Wrong Password"
return

}

msg.innerText="Loading bookmarks..."

try{

let r=await fetch(SOURCE_URL)

let html=await r.text()

login.style.display="none"

content.innerHTML=html

content.style.display="block"

window.scrollTo(0,0)

}catch(e){

msg.innerText="source.html 載入失敗"

}

}

password.addEventListener("keydown",e=>{
if(e.key==="Enter") unlock()
})

unlockBtn.onclick=unlock

init()

</script>

</body>
</html>
