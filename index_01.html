<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Private Bookmark</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        /* 1. 移除邊距，解決右側 Bar 問題 */
        body { margin: 0; padding: 0; font-family: Arial; background: #fff; overflow-x: hidden; }

        .header {
            position: relative;
            text-align: center;
            background: linear-gradient(60deg, #543ab7, #00acc1);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .inner-header {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding-bottom: 5vh; /* 讓標題與輸入框稍微往上，留出空間給波浪 */
        }

        input {
            padding: 12px; border-radius: 25px; border: none;
            width: 240px; text-align: center; font-size: 16px;
            outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 30px; margin-top: 15px; border-radius: 25px;
            border: 2px solid white; background: transparent;
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: white; color: #00acc1; }

        #msg { margin-top: 10px; font-size: 14px; color: #ffdede; }

        /* 2. 波浪高度調整：降低波浪佔比，並確保下方無縫對接白底 */
        .waves {
            position: relative;
            width: 100%;
            height: 10vh; /* 降低波浪整體視覺高度 */
            min-height: 80px;
            max-height: 120px;
            margin-bottom: -1px; /* 消除與底部的細微縫隙 */
            display: block;
        }

        .parallax > use { animation: move 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }
        .parallax > use:nth-child(5) { animation-delay: -6s; animation-duration: 15s; }
        .parallax > use:nth-child(6) { animation-delay: -7s; animation-duration: 25s; }

        @keyframes move {
            0% { transform: translate3d(-90px,0,0); }
            100% { transform: translate3d(85px,0,0); }
        }

        #content-main { display: none; width: 100%; min-height: 100vh; background: #fff; }
    </style>
</head>

<body>

<div id="login-screen" class="header">
    <div class="inner-header">
        <h1>Private Bookmark</h1>
        <input type="password" id="password" placeholder="輸入密碼">
        <br>
        <button id="unlockBtn" onclick="unlock()">UNLOCK</button>
        <p id="msg"></p>
    </div>

    <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none">
        <defs><path id="wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z"/></defs>
        <g class="parallax">
            <use href="#wave" x="48" y="0" fill="rgba(255,255,255,0.6)"/>
            <use href="#wave" x="48" y="1" fill="rgba(255,255,255,0.4)"/>
            <use href="#wave" x="48" y="2" fill="rgba(255,255,255,0.2)"/>
            <use href="#wave" x="48" y="3" fill="rgba(255,255,255,0.4)"/>
            <use href="#wave" x="48" y="4" fill="rgba(255,255,255,0.3)"/>
            <use href="#wave" x="48" y="5" fill="#fff"/> </g>
    </svg>
</div>

<div id="content-main"></div>

<script>
    const PASS_URL = "pass.json";
    const JSON_FILE_ID = "1GaBrL5ZFgOEXRJvoChS_S0XmiK99UdYj";
    let HASH = "";
    let attempt = 0;

    async function init() {
        try {
            let r = await fetch(PASS_URL);
            let data = await r.json();
            HASH = data.hash;
        } catch (e) {
            document.getElementById('msg').innerText = "pass.json 讀取失敗";
        }
    }

    function unlock() {
        if (attempt >= 5) return;
        const input = document.getElementById('password').value;
        if (CryptoJS.SHA256(input).toString() === HASH) {
            loadSource();
        } else {
            attempt++;
            document.getElementById('msg').innerText = `Wrong Password (${5-attempt})`;
        }
    }

    async function loadSource() {
        document.getElementById('msg').innerText = "Synchronizing...";
        try {
            const r = await fetch(`https://docs.google.com/uc?export=download&id=${JSON_FILE_ID}`);
            const json = await r.json();
            const html = decodeURIComponent(atob(json.data).split('').map(c => 
                '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
            ).join(''));

            document.getElementById('login-screen').style.display = "none";
            const main = document.getElementById('content-main');
            main.style.display = "block";
            main.innerHTML = html;
        } catch (e) {
            document.getElementById('msg').innerText = "載入失敗";
        }
    }

    document.getElementById('password').addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });
    init();
</script>

</body>
</html>
