<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">

<title>Private Bookmark</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#EBEBEB;
}

.header{
position:relative;
height:60vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(60deg,#543ab7,#00acc1);
color:white;
text-align:center;
}

input{
padding:12px;
border-radius:25px;
border:none;
width:220px;
text-align:center;
font-size:16px;
}

button{
margin-top:15px;
padding:10px 30px;
border-radius:25px;
border:2px solid white;
background:transparent;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:white;
color:#00acc1;
}

#content{
display:none;
min-height:100vh;
}

#msg{
font-size:13px;
margin-top:10px;
color:#ffdede;
}

</style>

</head>

<body>

<div id="login" class="header">

<h1>Private Bookmark</h1>

<input
type="password"
id="password"
placeholder="Connecting..."
disabled>

<br>

<button id="unlockBtn" disabled>CONNECTING</button>

<p id="msg"></p>

</div>

<div id="content"></div>

<script>

/* --------------------
   Cloud file location
-------------------- */

const PASS_URL="pass.json"

const SOURCE_URL=
"https://drive.google.com/uc?export=download&id=1G1p60Ha8Zh5_0wz-aqPUBorIKf3WqnoG"

/* --------------------
   Variables
-------------------- */

let HASH=""

let attempt=0

/* --------------------
   Init
-------------------- */

async function init(){

try{

let r=await fetch(PASS_URL)

let data=await r.json()

HASH=data.hash

password.disabled=false
password.placeholder="輸入解鎖密碼"

unlockBtn.disabled=false
unlockBtn.innerText="UNLOCK"

}catch(e){

msg.innerText="pass.json 讀取失敗"

}

}

/* --------------------
   Unlock
-------------------- */

async function unlock(){

if(attempt>5){

msg.innerText="Too many attempts"
return

}

let input=password.value

let hash=CryptoJS.SHA256(input).toString()

if(hash!==HASH){

attempt++

msg.innerText="Wrong Password"

return

}

msg.innerText="Loading bookmarks..."

try{

let r=await fetch(SOURCE_URL)

let html=await r.text()

login.style.display="none"

content.innerHTML=html

content.style.display="block"

window.scrollTo(0,0)

}catch(e){

msg.innerText="source.html 載入失敗"

}

}

/* --------------------
   Enter key
-------------------- */

password.addEventListener("keydown",e=>{

if(e.key==="Enter") unlock()

})

unlockBtn.onclick=unlock

/* --------------------
   Start
-------------------- */

init()

</script>

</body>
</html>
