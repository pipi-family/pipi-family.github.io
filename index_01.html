<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Private Bookmark</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:#EBEBEB;
}

.header{
height:60vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(60deg,#543ab7,#00acc1);
color:white;
}

input{
padding:12px;
border-radius:20px;
border:none;
width:200px;
text-align:center;
}

button{
margin-top:15px;
padding:10px 25px;
border-radius:20px;
border:2px solid white;
background:transparent;
color:white;
cursor:pointer;
}

#content{
display:none;
}

</style>

</head>

<body>

<div id="login" class="header">

<h1>Private Bookmark</h1>

<input type="password" id="pw" placeholder="Connecting..." disabled>

<br>

<button id="btn" disabled>CONNECTING</button>

<p id="msg"></p>

</div>

<div id="content"></div>

<script>

/* Drive File ID */

const PASS_ID="1KrW-Vh2i6YmaT2Uo1_4JiG-3OzXR0Owe"
const SOURCE_ID="1G1p60Ha8Zh5_0wz-aqPUBorIKf3WqnoG"

/* Proxy URL */

const PASS_URL=`https://drive.googleusercontent.com/uc?id=${PASS_ID}`
const SOURCE_URL=`https://drive.googleusercontent.com/uc?id=${SOURCE_ID}`

let HASH=""

/* 初始化 */

async function init(){

try{

let r=await fetch(PASS_URL)
let t=await r.text()

let data=JSON.parse(t)

HASH=data.hash

pw.disabled=false
pw.placeholder="輸入解鎖密碼"

btn.disabled=false
btn.innerText="UNLOCK"

}catch(e){

msg.innerText="pass.json 讀取失敗"

}

}

/* 驗證 */

async function unlock(){

let input=pw.value
let h=CryptoJS.SHA256(input).toString()

if(h!==HASH){

msg.innerText="Wrong Password"
return

}

msg.innerText="Loading..."

let r=await fetch(SOURCE_URL)
let html=await r.text()

login.style.display="none"

content.innerHTML=html
content.style.display="block"

}

/* Enter */

document.addEventListener("keydown",e=>{

if(e.key==="Enter") unlock()

})

btn.onclick=unlock

init()

</script>

</body>
</html>
