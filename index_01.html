<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Private Bookmark</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url(//fonts.googleapis.com/css?family=Lato:300:400);
        body { margin: 0; font-family: 'Lato', sans-serif; background: #EBEBEB; overflow-x: hidden; }
        .header { position: relative; text-align: center; background: linear-gradient(60deg, #543ab7 0%, #00acc1 100%); color: white; }
        .inner-header { height: 60vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        input { padding: 12px; border-radius: 25px; border: none; width: 220px; text-align: center; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); outline: none; }
        button { padding: 10px 30px; margin-top: 15px; border-radius: 25px; border: 2px solid white; background: transparent; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: white; color: #00acc1; }
        #msg { font-size: 13px; margin-top: 10px; color: #ffdede; min-height: 1.2em; }
        .waves { position: relative; width: 100%; height: 15vh; margin-bottom: -7px; min-height: 100px; max-height: 150px; }
        .parallax > use { animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }
        @keyframes move-forever { 0% { transform: translate3d(-90px,0,0); } 100% { transform: translate3d(85px,0,0); } }
        #content { display: none; width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="login" class="header">
    <div class="inner-header">
        <h1>Private Bookmark</h1>
        <div style="margin-top: 20px;">
            <input type="password" id="password" placeholder="輸入解鎖密碼">
            <br>
            <button id="unlockBtn" onclick="unlock()">UNLOCK</button>
            <p id="msg"></p>
        </div>
    </div>
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none">
        <defs><path id="wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z"/></defs>
        <g class="parallax">
            <use href="#wave" x="48" y="0" fill="rgba(255,255,255,0.7)"/><use href="#wave" x="48" y="3" fill="rgba(255,255,255,0.5)"/><use href="#wave" x="48" y="5" fill="rgba(255,255,255,0.3)"/><use href="#wave" x="48" y="7" fill="#fff"/>
        </g>
    </svg>
</div>

<div id="content"></div>

<script>
    // 密碼雜湊 (這是 ^.^_@_0505 的 SHA256)
    const CORRECT_HASH = "b6a06657871e9565507981882f09405f6e864819d9b04f76239f60f699049449";
    const SOURCE_ID = "1G1p60Ha8Zh5_0wz-aqPUBorIKf3WqnoG";
    let attempts = 0;

    function unlock() {
        if (attempts >= 5) {
            document.getElementById('msg').innerText = "嘗試次數過多";
            return;
        }
        const pw = document.getElementById('password').value;
        const hash = CryptoJS.SHA256(pw).toString();
        
        if (hash === CORRECT_HASH) {
            document.getElementById('login').style.display = "none";
            const contentDiv = document.getElementById('content');
            contentDiv.style.display = "block";
            contentDiv.innerHTML = `<iframe src="https://drive.google.com/file/d/${SOURCE_ID}/preview"></iframe>`;
        } else {
            attempts++;
            document.getElementById('msg').innerText = `密碼錯誤 (剩餘 ${5 - attempts} 次)`;
            document.getElementById('password').value = "";
        }
    }

    document.getElementById('password').addEventListener("keydown", e => {
        if (e.key === "Enter") unlock();
    });
</script>
</body>
</html>
