<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

</head>

<body>

<h2>Private Bookmark</h2>

<input type="password" id="pw">
<button onclick="login()">Unlock</button>

<p id="msg"></p>

<div id="content"></div>

<script>

const PASS_ID="1KrW-Vh2i6YmaT2Uo1_4JiG-3OzXR0Owe"
const SRC_ID="1G1p60Ha8Zh5_0wz-aqPUBorIKf3WqnoG"

let HASH=""

async function init(){

let r=await fetch("https://drive.google.com/uc?export=download&id="+PASS_ID)

let j=await r.json()

HASH=j.hash

}

async function login(){

let input=document.getElementById("pw").value

let h=CryptoJS.SHA256(input).toString()

if(h==HASH){

let r=await fetch("https://drive.google.com/uc?export=download&id="+SRC_ID)

let html=await r.text()

document.getElementById("content").innerHTML=html

}else{

document.getElementById("msg").innerText="Wrong Password"

}

}

init()

</script>

</body>
</html>
