<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">

<title>Private Bookmark</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>

@import url(//fonts.googleapis.com/css?family=Lato:300:400);

body{
margin:0;
font-family:'Lato',sans-serif;
}

/* header */

.header{
position:relative;
text-align:center;
background:linear-gradient(60deg,#543ab7 0%,#00acc1 100%);
color:white;
}

.inner-header{
height:60vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* login */

input{
padding:12px;
border-radius:25px;
border:none;
width:220px;
text-align:center;
font-size:16px;
}

button{
padding:10px 30px;
margin-top:15px;
border-radius:25px;
border:2px solid white;
background:transparent;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:white;
color:#00acc1;
}

#msg{
font-size:13px;
margin-top:10px;
color:#ffdede;
}

/* waves */

.waves{
position:relative;
width:100%;
height:15vh;
margin-bottom:-7px;
min-height:100px;
max-height:150px;
}

.parallax>use{
animation:move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
}

.parallax>use:nth-child(1){
animation-delay:-2s;
animation-duration:7s;
}

.parallax>use:nth-child(2){
animation-delay:-3s;
animation-duration:10s;
}

.parallax>use:nth-child(3){
animation-delay:-4s;
animation-duration:13s;
}

.parallax>use:nth-child(4){
animation-delay:-5s;
animation-duration:20s;
}

@keyframes move-forever{
0%{transform:translate3d(-90px,0,0)}
100%{transform:translate3d(85px,0,0)}
}

/* content */

#content{
display:none;
min-height:100vh;
background:#EBEBEB;
}

iframe{
width:100%;
height:100vh;
border:none;
}

</style>

</head>

<body>

<div id="login" class="header">

<div class="inner-header">

<h1>Private Bookmark</h1>

<input
type="password"
id="password"
placeholder="Connecting..."
disabled>

<br>

<button id="unlockBtn" disabled>CONNECTING</button>

<p id="msg"></p>

</div>

<svg class="waves"
xmlns="http://www.w3.org/2000/svg"
viewBox="0 24 150 28"
preserveAspectRatio="none">

<defs>

<path id="wave"
d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z"/>

</defs>

<g class="parallax">

<use href="#wave" x="48" y="0" fill="rgba(255,255,255,0.7)"/>
<use href="#wave" x="48" y="3" fill="rgba(255,255,255,0.5)"/>
<use href="#wave" x="48" y="5" fill="rgba(255,255,255,0.3)"/>
<use href="#wave" x="48" y="7" fill="#fff"/>

</g>

</svg>

</div>

<div id="content"></div>

<script>

/* cloud files */

const PASS_URL="pass.json"

const SOURCE_ID="1G1p60Ha8Zh5_0wz-aqPUBorIKf3WqnoG"

/* vars */

let HASH=""
let attempt=0

/* init */

async function init(){

try{

let r=await fetch(PASS_URL)
let data=await r.json()

HASH=data.hash

password.disabled=false
password.placeholder="輸入解鎖密碼"

unlockBtn.disabled=false
unlockBtn.innerText="UNLOCK"

}catch(e){

msg.innerText="pass.json 讀取失敗"

}

}

/* unlock */

function unlock(){

if(attempt>5){

msg.innerText="Too many attempts"
return

}

let input=password.value

let hash=CryptoJS.SHA256(input).toString()

if(hash!==HASH){

attempt++
msg.innerText="Wrong Password"
return

}

/* load source */

login.style.display="none"

content.style.display="block"

content.innerHTML=
`<iframe src="https://drive.google.com/file/d/${SOURCE_ID}/preview"></iframe>`

}

/* enter key */

password.addEventListener("keydown",e=>{

if(e.key==="Enter") unlock()

})

unlockBtn.onclick=unlock

init()

</script>

</body>

</html>
