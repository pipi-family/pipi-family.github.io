<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Private Bookmark</title>

    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/gif" href="/favicon/animated_favicon1.gif">
    <link rel="icon" href="/favicon/favicon.ico" type="image/x-icon">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        body { margin: 0; font-family: Arial; background: #fff; overflow-x: hidden; }

        .header {
            position: relative;
            text-align: center;
            background: linear-gradient(60deg, #543ab7, #00acc1);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .inner-header {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        input {
            padding: 12px; border-radius: 25px; border: none;
            width: 240px; text-align: center; font-size: 16px;
            outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 30px; margin-top: 15px; border-radius: 25px;
            border: 2px solid white; background: transparent;
            color: white; font-weight: bold; cursor: pointer;
        }

        #msg { margin-top: 10px; font-size: 14px; color: #ffdede; min-height: 1.2em; }

        /* 波浪高度回升與優化 */
        .waves {
            position: relative;
            width: 100%;
            height: 20vh; /* 增加波浪高度 */
            margin-bottom: -5px;
            min-height: 150px;
            max-height: 100px;
        }

        .parallax > use { animation: move 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }
        .parallax > use:nth-child(5) { animation-delay: -6s; animation-duration: 15s; }
        .parallax > use:nth-child(6) { animation-delay: -7s; animation-duration: 25s; }

        @keyframes move {
            0% { transform: translate3d(-90px,0,0); }
            100% { transform: translate3d(85px,0,0); }
        }

        #content-main { display: none; width: 100%; min-height: 100vh; }
    </style>
</head>

<body>

<div id="login-screen" class="header">
    <div class="inner-header">
        <h1>Private Bookmark</h1>
        <input type="password" id="password" placeholder="Connecting..." disabled>
        <br>
        <button id="unlockBtn" disabled onclick="unlock()">CONNECTING</button>
        <p id="msg"></p>
    </div>

    <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none">
        <defs><path id="wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z"/></defs>
        <g class="parallax">
            <use href="#wave" x="48" y="0" fill="rgba(255,255,255,0.5)"/>
            <use href="#wave" x="48" y="2" fill="rgba(255,255,255,0.3)"/>
            <use href="#wave" x="48" y="4" fill="rgba(255,255,255,0.2)"/>
            <use href="#wave" x="48" y="6" fill="rgba(255,255,255,0.4)"/>
            <use href="#wave" x="48" y="8" fill="rgba(255,255,255,0.3)"/>
            <use href="#wave" x="48" y="10" fill="#fff"/>
        </g>
    </svg>
</div>

<div id="content-main"></div>

<script>
    const PASS_URL = "pass.json";
    // 您的 source.json 檔案 ID
    const JSON_FILE_ID = "1GaBrL5ZFgOEXRJvoChS_S0XmiK99UdYj";

    let HASH = "";
    let attempt = 0;

    async function init() {
        try {
            let r = await fetch(PASS_URL);
            let data = await r.json();
            HASH = data.hash;

            document.getElementById('password').disabled = false;
            document.getElementById('password').placeholder = "輸入密碼";
            document.getElementById('unlockBtn').disabled = false;
            document.getElementById('unlockBtn').innerText = "UNLOCK";
        } catch (e) {
            document.getElementById('msg').innerText = "pass.json 讀取失敗";
        }
    }

    function unlock() {
        if (attempt >= 5) {
            document.getElementById('msg').innerText = "Too many attempts";
            return;
        }

        const input = document.getElementById('password').value;
        const hash = CryptoJS.SHA256(input).toString();

        if (hash !== HASH) {
            attempt++;
            document.getElementById('msg').innerText = `Wrong Password (剩餘 ${5 - attempt} 次)`;
            return;
        }

        loadSource();
    }

    async function loadSource() {
        const msg = document.getElementById('msg');
        msg.innerText = "Synchronizing...";

        // 使用 URLSearchParams 構建請求網址，並確保強制下載
        const url = `https://docs.google.com/uc?export=download&id=${JSON_FILE_ID}`;
        
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Network response was not ok');
            const json = await response.json();
            
            // 解碼並渲染
            const base64Data = json.data;
            const html = decodeURIComponent(atob(base64Data).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            document.getElementById('login-screen').style.display = "none";
            const main = document.getElementById('content-main');
            main.style.display = "block";
            main.innerHTML = html;
            window.scrollTo(0, 0);

        } catch (e) {
            // 如果 fetch 失敗，可能是 CORS 問題，提供一個備用的 iframe 方法
            msg.innerHTML = "權限限制，正在嘗試備用載入...";
            console.error(e);
            
            // 備用方案：如果 JSON 抓不到，嘗試直接跳轉到 preview 模式
            setTimeout(() => {
                window.location.href = `https://drive.google.com/file/d/${JSON_FILE_ID}/preview`;
            }, 1500);
        }
    }

    document.getElementById('password').addEventListener("keydown", e => {
        if (e.key === "Enter") unlock();
    });

    init();
</script>

</body>
</html>
