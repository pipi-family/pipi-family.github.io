<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bookmark Dashboard</title>

<link rel="icon" href="/favicon/favicon.ico">

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:#0f172a;
overflow-x:hidden;
}

/* animated gradient background */

body::before{

content:"";
position:fixed;
width:200%;
height:200%;
top:-50%;
left:-50%;

background:
radial-gradient(circle at 20% 20%,#6366f1,transparent 30%),
radial-gradient(circle at 80% 30%,#06b6d4,transparent 30%),
radial-gradient(circle at 40% 80%,#9333ea,transparent 30%);

animation:bgMove 25s linear infinite;
z-index:-1;

}

@keyframes bgMove{

0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}

}

/* header */

header{

text-align:center;
padding:60px 20px 30px;

}

h1{
margin:0;
font-weight:300;
letter-spacing:2px;
}

/* search */

.searchBox{

margin-top:30px;

}

.searchBox input{

width:320px;
padding:14px;
border-radius:30px;
border:none;
font-size:16px;
text-align:center;

}

/* container */

.container{

max-width:1000px;
margin:auto;
padding:40px;

}

/* category */

.category{

margin-bottom:40px;

}

.category h2{

font-weight:400;
border-bottom:1px solid rgba(255,255,255,0.2);
padding-bottom:8px;

}

/* cards */

.grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:18px;

}

.card{

background:rgba(255,255,255,0.08);
border-radius:14px;
padding:18px;
text-align:center;
cursor:pointer;
transition:0.2s;

}

.card:hover{

transform:translateY(-4px);
background:rgba(255,255,255,0.15);

}

.card img{

width:32px;
height:32px;
margin-bottom:8px;

}

/* dark mode button */

.darkToggle{

position:fixed;
top:15px;
right:20px;
cursor:pointer;
font-size:14px;
opacity:0.7;

}

/* hidden link */

.hiddenLink{

position:fixed;
bottom:5px;
right:10px;
font-size:8px;
opacity:0.05;

}

</style>

</head>

<body>

<div class="darkToggle" onclick="toggleDark()">☾</div>

<header>

<h1>Bookmark Dashboard</h1>

<div class="searchBox">

<input
id="search"
placeholder="Search with Google"
onkeydown="searchEnter(event)">

</div>

</header>

<div class="container">

<!-- AI -->

<div class="category">

<h2>AI</h2>

<div class="grid">

<div class="card"
onclick="go('https://chat.openai.com')">

<img src="https://www.google.com/s2/favicons?domain=openai.com">
<br>ChatGPT

</div>

<div class="card"
onclick="go('https://claude.ai')">

<img src="https://www.google.com/s2/favicons?domain=claude.ai">
<br>Claude

</div>

<div class="card"
onclick="go('https://gemini.google.com')">

<img src="https://www.google.com/s2/favicons?domain=google.com">
<br>Gemini

</div>

</div>

</div>

<!-- Tools -->

<div class="category">

<h2>Tools</h2>

<div class="grid">

<div class="card"
onclick="go('https://github.com')">

<img src="https://www.google.com/s2/favicons?domain=github.com">
<br>GitHub

</div>

<div class="card"
onclick="go('https://drive.google.com')">

<img src="https://www.google.com/s2/favicons?domain=drive.google.com">
<br>Drive

</div>

<div class="card"
onclick="go('https://notion.so')">

<img src="https://www.google.com/s2/favicons?domain=notion.so">
<br>Notion

</div>

</div>

</div>

</div>

<!-- hidden source -->

<a class="hiddenLink" href="source.html">.</a>

<script>

/* open site */

function go(url){

window.open(url)

}

/* google search */

function searchEnter(e){

if(e.key==="Enter"){

let q=document.getElementById("search").value

window.open(
"https://www.google.com/search?q="+encodeURIComponent(q)
)

}

}

/* dark mode */

function toggleDark(){

if(document.body.style.background=="white"){

document.body.style.background="#0f172a"
document.body.style.color="white"

}else{

document.body.style.background="white"
document.body.style.color="black"

}

}

</script>

</body>

</html>
