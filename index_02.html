<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Private Bookmark</title>

    <link rel="shortcut icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/gif" href="/favicon/animated_favicon1.gif">
    <link rel="icon" href="/favicon/favicon.ico" type="image/x-icon">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        /* 移除預設邊距，解決右側 Scrollbar 問題 */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            overflow-x: hidden; 
            background-color: #ffffff; /* 確保底色是純白 */
        }

        .header {
            position: relative;
            text-align: center;
            background: linear-gradient(60deg, #543ab7 0%, #00acc1 100%);
            color: white;
            min-height: 60vh; /* 回復到較舒適的高度 */
            display: flex;
            flex-direction: column;
        }

        .inner-header {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        input {
            padding: 12px; border-radius: 25px; border: none;
            width: 240px; text-align: center; font-size: 16px;
            outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 30px; margin-top: 15px; border-radius: 25px;
            border: 2px solid white; background: transparent;
            color: white; font-weight: bold; cursor: pointer;
        }

        #msg { margin-top: 10px; font-size: 14px; color: #ffdede; min-height: 1.2em; }

        /* 波浪區塊修正 */
        .waves {
            position: relative;
            width: 100%;
            height: 15vh;
            min-height: 100px;
            max-height: 150px;
            display: block; /* 移除 inline 導致的微小間隙 */
            margin-bottom: -1px; /* 向下壓 1px 確保與白底融合 */
        }

        /* 6層波浪動畫設定 */
        .parallax > use { animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite; }
        .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; }
        .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; }
        .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; }
        .parallax > use:nth-child(5) { animation-delay: -6s; animation-duration: 15s; }
        .parallax > use:nth-child(6) { animation-delay: -7s; animation-duration: 25s; }

        @keyframes move-forever {
            0% { transform: translate3d(-90px,0,0); }
            100% { transform: translate3d(85px,0,0); }
        }

        /* 內容顯示區 */
        #content-main { 
            display: none; 
            width: 100%; 
            background: #ffffff; 
        }
    </style>
</head>

<body>

<div id="login-ui" class="header">
    <div class="inner-header">
        <h1>Private Bookmark</h1>
        <input type="password" id="password" placeholder="Connecting..." disabled>
        <br>
        <button id="unlockBtn" disabled onclick="unlock()">CONNECTING</button>
        <p id="msg"></p>
    </div>

    <svg class="waves" xmlns="http://www.w3.org/2000/svg" viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
        <defs><path id="wave" d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z"/></defs>
        <g class="parallax">
            <use href="#wave" x="48" y="0" fill="rgba(255,255,255,0.7)"/>
            <use href="#wave" x="48" y="2" fill="rgba(255,255,255,0.5)"/>
            <use href="#wave" x="48" y="4" fill="rgba(255,255,255,0.3)"/>
            <use href="#wave" x="48" y="6" fill="rgba(255,255,255,0.4)"/>
            <use href="#wave" x="48" y="8" fill="rgba(255,255,255,0.2)"/>
            <use href="#wave" x="48" y="10" fill="#ffffff"/> </g>
    </svg>
</div>

<div id="content-main"></div>

<script>
    const PASS_URL = "pass.json";
    const JSON_FILE_ID = "1GaBrL5ZFgOEXRJvoChS_S0XmiK99UdYj";
    let HASH = "";
    let attempt = 0;

    async function init() {
        try {
            let r = await fetch(PASS_URL);
            let data = await r.json();
            HASH = data.hash;
            document.getElementById('password').disabled = false;
            document.getElementById('password').placeholder = "輸入密碼";
            document.getElementById('unlockBtn').disabled = false;
            document.getElementById('unlockBtn').innerText = "UNLOCK";
        } catch (e) {
            document.getElementById('msg').innerText = "pass.json 讀取失敗";
        }
    }

    function unlock() {
        if (attempt >= 5) return;
        const pw = document.getElementById('password').value;
        if (CryptoJS.SHA256(pw).toString() === HASH) {
            loadSource();
        } else {
            attempt++;
            document.getElementById('msg').innerText = `Wrong Password (${5-attempt})`;
        }
    }

    async function loadSource() {
        document.getElementById('msg').innerText = "Loading...";
        try {
            const r = await fetch(`https://docs.google.com/uc?export=download&id=${JSON_FILE_ID}`);
            const json = await r.json();
            
            // 安全解碼 (支援中文)
            const html = decodeURIComponent(atob(json.data).split('').map(c => 
                '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
            ).join(''));

            document.getElementById('login-ui').style.display = "none";
            const main = document.getElementById('content-main');
            main.style.display = "block";
            main.innerHTML = html;
            window.scrollTo(0,0);
        } catch (e) {
            document.getElementById('msg').innerText = "載入失敗，請檢查權限";
        }
    }

    document.getElementById('password').addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });
    init();
</script>
</body>
</html>
